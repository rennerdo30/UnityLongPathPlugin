name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\NuGet\Cache
            ~\.nuget\packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/NuGet.Config', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore UnityLongPathPlugin.sln

      - name: Build
        run: dotnet build UnityLongPathPlugin.sln --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: UnityLongPathPlugin
          path: UnityLongPathPlugin/bin/Release/net46/UnityLongPathPlugin.dll
          if-no-files-found: error
